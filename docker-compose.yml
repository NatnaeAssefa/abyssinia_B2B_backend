version: "3.7"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    tty: true
    stdin_open: true
    ports:
      - "8000:8000"
    expose:
      - "8000"
    volumes:
      - ./src:/api/src
      - ./data:/api/data
      - ./logs:/logs
      - ./uploads:/uploads
    env_file:
      - .env
